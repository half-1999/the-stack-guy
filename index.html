<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>The Stack Guy | MERN Stack Web Development for Businesses</title>
  <meta name="description"
    content="We build high-performance MERN stack websites for coaching centers, clinics, restaurants, and businesses. Launch your website in 48 hours." />
  <meta name="keywords"
    content="MERN developer, website for coaching center, restaurant website, clinic website, full stack developer India" />
  <meta name="author" content="The Stack Guy" />
  <meta name="robots" content="index, follow" />

  <!-- Canonical -->
  <link rel="canonical" href="https://yourdomain.com/" />

  <!-- Open Graph -->
  <meta property="og:title" content="The Stack Guy | Build Your Business Website Fast" />
  <meta property="og:description" content="Modern MERN stack websites that convert visitors into customers." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yourdomain.com/" />
  <meta property="og:image" content="https://yourdomain.com/og-image.jpg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Stack Guy | MERN Developer" />
  <meta name="twitter:description" content="Launch your business website fast with modern tech." />
  <meta name="twitter:image" content="https://yourdomain.com/og-image.jpg" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" />

  <!-- Theme -->
  <meta name="theme-color" content="#0a0a0f" />

  <!-- Performance -->
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="preconnect" href="https://i.pravatar.cc" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "The Stack Guy",
    "url": "https://yourdomain.com",
    "logo": "https://yourdomain.com/logo.png",
    "sameAs": [
      "https://www.linkedin.com",
      "https://github.com"
    ]
  }

</head>
